# Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the KLOR OLED Display
# CONFIG_ZMK_DISPLAY=y

# Uncomment the following lines to enable per key RGB
# WARNING: RGB uses P0.06 (SPI MOSI) which conflicts with UART TX for wired split.
# Do NOT enable RGB on nice_nano with wired split.
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
# CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=40

CONFIG_ZMK_POINTING=y

# Wired split (full-duplex UART over TRRS, software crossover in overlays)
# CONFIG_ZMK_SPLIT_WIRED is auto-enabled by the zmk,wired-split devicetree node
CONFIG_ZMK_SPLIT_WIRED_UART_MODE_INTERRUPT=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Disable BLE split — this is a wired-only build
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_BLE=n
CONFIG_BT=n

CONFIG_ZMK_KEYBOARD_NAME="Airflow"
